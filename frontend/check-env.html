<!DOCTYPE html>
<html>
<head>
    <title>环境检查</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #0f0;
        }
        .success { color: #0f0; }
        .error { color: #f00; }
        .info { color: #ff0; }
        pre {
            background: #000;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 登录诊断工具</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function log(message, type = 'info') {
            const p = document.createElement('p');
            p.className = type;
            p.textContent = message;
            results.appendChild(p);
        }

        function logPre(content, type = 'info') {
            const pre = document.createElement('pre');
            pre.className = type;
            pre.textContent = content;
            results.appendChild(pre);
        }

        async function runTests() {
            log('=== 开始诊断 ===', 'info');

            // 1. 检查环境变量
            log('\n1. 检查 API 配置:', 'info');
            const apiUrl = 'http://localhost:8000/api';
            log(`   API URL: ${apiUrl}`, 'success');

            // 2. 测试健康检查
            log('\n2. 测试后端健康检查:', 'info');
            try {
                const healthResponse = await fetch('http://localhost:8000/health');
                const healthData = await healthResponse.json();
                log('   ✅ 后端健康检查通过', 'success');
                logPre(JSON.stringify(healthData, null, 2), 'success');
            } catch (error) {
                log('   ❌ 后端健康检查失败: ' + error.message, 'error');
            }

            // 3. 测试登录接口
            log('\n3. 测试登录接口:', 'info');
            try {
                const loginResponse = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: '123456'
                    })
                });

                const loginData = await loginResponse.json();

                if (loginResponse.ok) {
                    log('   ✅ 登录成功！', 'success');
                    logPre(JSON.stringify({
                        message: loginData.message,
                        user: loginData.user,
                        token: loginData.token ? '✓ Token已生成' : '✗ 无Token'
                    }, null, 2), 'success');

                    // 保存 token
                    if (loginData.token) {
                        localStorage.setItem('token', loginData.token);
                        log('\n   ✅ Token已保存到localStorage', 'success');
                        log('\n   🎉 你现在可以刷新页面并访问 http://localhost:3000/', 'success');
                    }
                } else {
                    log('   ❌ 登录失败', 'error');
                    logPre(JSON.stringify(loginData, null, 2), 'error');
                }
            } catch (error) {
                log('   ❌ 登录请求失败: ' + error.message, 'error');
                log('   可能原因：', 'error');
                log('   - CORS 问题', 'error');
                log('   - 后端未启动', 'error');
                log('   - 网络问题', 'error');
            }

            // 4. 检查 localStorage
            log('\n4. 检查 localStorage:', 'info');
            const token = localStorage.getItem('token');
            if (token) {
                log('   ✅ 已有 Token: ' + token.substring(0, 50) + '...', 'success');
            } else {
                log('   ⚠️  无 Token', 'info');
            }

            log('\n=== 诊断完成 ===', 'info');
        }

        runTests();
    </script>
</body>
</html>
