<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作者主页 - 调试页面</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        button {
            padding: 10px 20px;
            margin: 10px 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>创作者主页调试页面</h1>

    <h2>诊断步骤</h2>
    <div id="diagnostics"></div>

    <h2>测试按钮</h2>
    <button onclick="testDataLoad()">测试数据加载</button>
    <button onclick="testChartJS()">测试 Chart.js</button>
    <button onclick="location.href='index.html'">返回主页</button>

    <h2>日志</h2>
    <pre id="log"></pre>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <script>
        const log = document.getElementById('log');
        const diagnostics = document.getElementById('diagnostics');

        function addLog(message, type = 'info') {
            const line = `[${new Date().toLocaleTimeString()}] ${message}\n`;
            log.textContent += line;
            console.log(message);
        }

        function addDiagnostic(test, result, details = '') {
            const div = document.createElement('div');
            div.className = result ? 'success' : 'error';
            div.innerHTML = `${result ? '✅' : '❌'} ${test} ${details ? `<br><small>${details}</small>` : ''}`;
            diagnostics.appendChild(div);
        }

        // 自动运行诊断
        window.addEventListener('load', () => {
            addLog('页面加载完成');
            runDiagnostics();
        });

        function runDiagnostics() {
            diagnostics.innerHTML = '<h3>自动诊断结果：</h3>';

            // 检查 Chart.js
            const hasChart = typeof Chart !== 'undefined';
            addDiagnostic('Chart.js 加载', hasChart, hasChart ? `版本: ${Chart.version}` : '');

            // 检查当前 URL
            addDiagnostic('当前 URL', true, window.location.href);

            // 检查 URL 参数
            const params = new URLSearchParams(window.location.search);
            const creator = params.get('creator');
            addDiagnostic('URL 参数', true, creator ? `creator=${creator}` : '无参数');

            // 检查数据文件路径
            const dataPath = '/creator-profile/data/creator-data.json';
            addDiagnostic('数据文件路径', true, dataPath);
        }

        async function testDataLoad() {
            addLog('开始测试数据加载...');
            try {
                const response = await fetch('/creator-profile/data/creator-data.json');
                addLog(`HTTP 状态: ${response.status} ${response.statusText}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                addLog('✅ 数据加载成功！');
                addLog(`数据内容: ${JSON.stringify(data.profile, null, 2).substring(0, 200)}...`);

                addDiagnostic('数据加载测试', true, `成功加载 ${Object.keys(data).length} 个数据字段`);
            } catch (error) {
                addLog(`❌ 数据加载失败: ${error.message}`);
                addDiagnostic('数据加载测试', false, error.message);
            }
        }

        function testChartJS() {
            addLog('测试 Chart.js...');
            if (typeof Chart === 'undefined') {
                addLog('❌ Chart.js 未加载');
                addDiagnostic('Chart.js 测试', false, 'Chart 对象不存在');
                return;
            }

            try {
                // 创建一个简单的测试图表
                const canvas = document.createElement('canvas');
                canvas.width = 100;
                canvas.height = 100;
                document.body.appendChild(canvas);

                const chart = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: ['A', 'B'],
                        datasets: [{
                            data: [1, 2]
                        }]
                    }
                });

                chart.destroy();
                canvas.remove();

                addLog('✅ Chart.js 工作正常');
                addDiagnostic('Chart.js 测试', true, '创建测试图表成功');
            } catch (error) {
                addLog(`❌ Chart.js 错误: ${error.message}`);
                addDiagnostic('Chart.js 测试', false, error.message);
            }
        }
    </script>
</body>
</html>
