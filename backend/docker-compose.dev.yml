version: '3.8'

services:
  # 轻量级 PostgreSQL（开发/小型部署）
  postgres:
    image: postgres:16-alpine
    container_name: workflow-postgres-dev
    environment:
      POSTGRES_DB: workflow_platform
      POSTGRES_USER: workflow_user
      POSTGRES_PASSWORD: workflow_dev_pass_2024
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - workflow-network
    # 轻量级配置，减少内存使用
    command: postgres -c shared_buffers=128MB -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis（可选，用于缓存）
  redis:
    image: redis:7-alpine
    container_name: workflow-redis-dev
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - workflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

networks:
  workflow-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
