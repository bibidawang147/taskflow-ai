version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: workflow-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-workflow_platform}
      POSTGRES_USER: ${DB_USER:-workflow_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - workflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-workflow_user} -d ${DB_NAME:-workflow_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: workflow-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change_me_in_production}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - workflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # 后端应用
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workflow-backend
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-workflow_user}:${DB_PASSWORD:-change_me_in_production}@postgres:5432/${DB_NAME:-workflow_platform}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_in_production}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # AI API Keys
      ALIBABA_API_KEY: ${ALIBABA_API_KEY}
      ALIBABA_BASE_URL: ${ALIBABA_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      ALIBABA_DEFAULT_MODEL: ${ALIBABA_DEFAULT_MODEL:-qwen-plus}
      ALIBABA_VISION_MODEL: ${ALIBABA_VISION_MODEL:-qwen-vl-plus}
      ALIBABA_IMAGE_MODEL: ${ALIBABA_IMAGE_MODEL:-wanx-v1}
      ALIBABA_VIDEO_TEXT_MODEL: ${ALIBABA_VIDEO_TEXT_MODEL:-wanx2.1-t2v-turbo}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - workflow-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # 数据库备份服务（可选）
  backup:
    image: postgres:16-alpine
    container_name: workflow-backup
    environment:
      POSTGRES_USER: ${DB_USER:-workflow_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-workflow_platform}
      BACKUP_KEEP_DAYS: 7
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh
    depends_on:
      - postgres
    networks:
      - workflow-network
    entrypoint: /bin/sh
    command: -c "while true; do sh /backup.sh; sleep 86400; done"
    restart: unless-stopped

networks:
  workflow-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
